<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project | Jose Osa</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <canvas id="stars"></canvas>

  <header class="nav">
    <a href="index.html" class="logo">JOSE OSA</a>
    <nav>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#research">Research</a>
      <a href="index.html#about">About</a>
      <a href="mailto:jmo2180@columbia.edu" class="pill">Contact</a>
    </nav>
  </header>

  <main class="project-page">
    <section class="project-hero project-hero-image reveal">
      <img id="projectImage" src="" alt="">
      <div class="project-hero-overlay"></div>
      <div class="project-hero-content">
        <p id="projectTag" class="eyebrow"></p>
        <h1 id="projectTitle"></h1>
        <p id="projectSummary"></p>
      </div>
    </section>

    <section class="case-study-grid reveal">
      <article class="case-block large">
        <p class="eyebrow">Overview</p>
        <h2 id="overviewTitle"></h2>
        <p id="projectOverview"></p>
      </article>

      <article class="case-block">
        <p class="eyebrow">Challenge</p>
        <h2>Design problem</h2>
        <p id="projectChallenge"></p>
      </article>

      <article class="case-block">
        <p class="eyebrow">Solution</p>
        <h2>Engineering approach</h2>
        <p id="projectSolution"></p>
      </article>
    </section>

    <section class="section project-detail reveal">
      <div>
        <p class="eyebrow">Technical Focus</p>
        <h2>Core systems</h2>
        <ul id="projectBullets"></ul>
      </div>

      <div>
        <p class="eyebrow">Impact</p>
        <h2>Why it matters</h2>
        <p id="projectImpact"></p>
      </div>
    </section>

    <section class="visual-showcase reveal">
      <div class="visual-copy">
        <p class="eyebrow">Engineering Visual</p>
        <h2 id="visualTitle"></h2>
        <p id="visualText"></p>
      </div>

      <div id="visualStage" class="visual-stage">
        <img id="diagramImage" class="diagram-image" src="" alt="">
        <div id="generatedVisual" class="generated-visual"></div>
      </div>
    </section>

    <a class="btn secondary back back-transition" href="index.html#projects">← Back to portfolio</a>

    <div id="backTransition" class="back-transition-layer">
      <div class="back-atom-earth">
        <div class="back-core"></div>
        <div class="back-ring ring-one"></div>
        <div class="back-ring ring-two"></div>
        <div class="back-ship"></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
